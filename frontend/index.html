<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calorie Tracker</title>
  <style>
    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --border: #e8e5e0;
      --text: #1a1917;
      --muted: #78716c;
      --cal-color: #ea580c;
      --pro-color: #2563eb;
      --carb-color: #7c3aed;
      --fat-color: #16a34a;
      --radius: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }

    /* Header */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0.875rem 1.5rem; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 10;
    }
    .header-left h1 { font-size: 1.05rem; font-weight: 700; }
    .header-left .date { font-size: 0.8rem; color: var(--muted); margin-top: 1px; }
    .header-right { display: flex; gap: 0.5rem; }

    /* Tabs */
    .tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      background: var(--surface); padding: 0 1.5rem;
    }
    .tab {
      padding: 0.65rem 1rem; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; border: none; background: none; color: var(--muted);
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      font-family: inherit; transition: all 0.12s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.45rem 0.9rem; border-radius: 7px; font-size: 0.85rem;
      font-weight: 500; cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); transition: all 0.12s;
      font-family: inherit;
    }
    .btn:hover { background: var(--bg); }
    .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
    .btn-primary:hover { opacity: 0.85; background: var(--text); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Main layout */
    main { max-width: 860px; margin: 0 auto; padding: 1.5rem; }

    /* Macro summary cards */
    .summary-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 600px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
    .macro-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 1.1rem 1.1rem 0.9rem; box-shadow: var(--shadow);
    }
    .macro-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
                   letter-spacing: 0.07em; margin-bottom: 0.35rem; }
    .macro-value { font-size: 1.6rem; font-weight: 700; line-height: 1; margin-bottom: 0.5rem; }
    .macro-sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.6rem; }
    .progress-track { height: 6px; background: var(--bg); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

    .macro-card.cal .macro-label { color: var(--cal-color); }
    .macro-card.cal .progress-fill { background: var(--cal-color); }
    .macro-card.pro .macro-label { color: var(--pro-color); }
    .macro-card.pro .progress-fill { background: var(--pro-color); }
    .macro-card.carb .macro-label { color: var(--carb-color); }
    .macro-card.carb .progress-fill { background: var(--carb-color); }
    .macro-card.fat .macro-label { color: var(--fat-color); }
    .macro-card.fat .progress-fill { background: var(--fat-color); }

    /* Meal cards */
    .meal-card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 1rem; overflow: hidden;
    }
    .meal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.875rem 1.1rem; border-bottom: 1px solid var(--border);
    }
    .meal-name { font-weight: 600; font-size: 0.95rem; }
    .meal-totals { display: flex; gap: 0.875rem; }
    .meal-total-item { font-size: 0.75rem; color: var(--muted); text-align: right; }
    .meal-total-item strong { display: block; font-size: 0.9rem; color: var(--text); }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
      padding: 0.5rem 1.1rem; border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    th:not(:first-child) { text-align: right; }
    td { padding: 0.55rem 1.1rem; font-size: 0.875rem; border-bottom: 1px solid var(--border); }
    td:not(:first-child) { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    /* States */
    .state-box {
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 3rem 2rem; text-align: center;
    }
    .state-box .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .state-box h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; }
    .state-box p { font-size: 0.85rem; color: var(--muted); max-width: 400px; margin: 0 auto 1rem; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--text); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* History */
    .history-section { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .history-toolbar {
      padding: 0.875rem 1.1rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .history-toolbar h2 { font-size: 0.9rem; font-weight: 600; }
    .macro-toggle { display: flex; gap: 0.4rem; }
    .macro-pill {
      padding: 0.2rem 0.6rem; border-radius: 99px; font-size: 0.72rem;
      font-weight: 600; cursor: pointer; border: 1.5px solid; transition: all 0.12s;
      font-family: inherit;
    }
    .macro-pill.cal  { border-color: var(--cal-color);  color: var(--cal-color); }
    .macro-pill.pro  { border-color: var(--pro-color);  color: var(--pro-color); }
    .macro-pill.carb { border-color: var(--carb-color); color: var(--carb-color); }
    .macro-pill.fat  { border-color: var(--fat-color);  color: var(--fat-color); }
    .macro-pill.active.cal  { background: var(--cal-color);  color: #fff; }
    .macro-pill.active.pro  { background: var(--pro-color);  color: #fff; }
    .macro-pill.active.carb { background: var(--carb-color); color: #fff; }
    .macro-pill.active.fat  { background: var(--fat-color);  color: #fff; }

    /* Chart */
    .chart-wrap { padding: 1.25rem 1.1rem 0.5rem; overflow-x: auto; }
    .chart { display: flex; align-items: flex-end; gap: 6px; height: 160px; min-width: max-content; }
    .chart-col { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 38px; }
    .bar-group { display: flex; gap: 2px; align-items: flex-end; height: 140px; }
    .bar {
      width: 8px; border-radius: 3px 3px 0 0; transition: height 0.4s ease;
      position: relative; cursor: default;
    }
    .bar.cal  { background: var(--cal-color); }
    .bar.pro  { background: var(--pro-color); }
    .bar.carb { background: var(--carb-color); }
    .bar.fat  { background: var(--fat-color); }
    .bar.hidden { display: none; }
    .chart-label { font-size: 0.62rem; color: var(--muted); white-space: nowrap; }
    .target-line {
      position: relative; border-top: 1.5px dashed rgba(0,0,0,0.15);
      margin: 0 1.1rem; font-size: 0.65rem; color: var(--muted); text-align: right;
      padding-top: 2px;
    }

    /* History table */
    .history-table { border-top: 1px solid var(--border); }
    .history-table table { width: 100%; }
    .history-table th { background: var(--bg); }
    .history-table td:first-child { font-weight: 500; }

    /* Settings modal */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      display: none; align-items: center; justify-content: center; z-index: 50;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: var(--radius);
      padding: 1.5rem; width: 380px; box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    }
    .modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 1.1rem; }
    .field { margin-bottom: 0.875rem; }
    .field label { font-size: 0.78rem; color: var(--muted); display: block; margin-bottom: 4px; }
    .field input {
      width: 100%; padding: 0.45rem 0.7rem; border-radius: 7px;
      border: 1px solid var(--border); font-size: 0.85rem; font-family: inherit;
    }
    .field input:focus { outline: none; border-color: var(--text); }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }

    /* Toast */
    #toast {
      position: fixed; bottom: 1.25rem; right: 1.25rem;
      background: #1c1917; color: #fff; padding: 0.5rem 1rem;
      border-radius: 8px; font-size: 0.83rem; opacity: 0;
      transition: opacity 0.25s; pointer-events: none; z-index: 100;
    }
    #toast.show { opacity: 1; }

    /* ══════════════════════════════════════════════
       MOBILE  (≤ 640px)
    ══════════════════════════════════════════════ */
    @media (max-width: 640px) {
      .btn-label-full { display: none !important; }
      .btn-label-short { display: inline !important; }

      header { padding: 0.65rem 1rem; }
      .header-left h1 { font-size: 0.95rem; }
      .header-left .date { display: none; }
      .btn { padding: 0.5rem 0.75rem; font-size: 0.8rem; }

      .tabs { padding: 0 0.75rem; }
      .tab { padding: 0.6rem 0.75rem; font-size: 0.8rem; }

      main { padding: 1rem 0.75rem; }

      /* Macro cards already go 2-col at 600px — tighten padding */
      .macro-card { padding: 0.875rem 0.875rem 0.75rem; }
      .macro-value { font-size: 1.35rem; }

      /* Meal header stacks on small screens */
      .meal-header { flex-direction: column; align-items: flex-start; gap: 0.4rem; padding: 0.75rem 0.9rem; }
      .meal-totals { gap: 0.75rem; }
      .meal-total-item { text-align: left; }

      /* Make tables scroll horizontally rather than overflow */
      .meal-card { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      th { padding: 0.45rem 0.75rem; font-size: 0.65rem; }
      td { padding: 0.5rem 0.75rem; font-size: 0.8rem; }

      /* History table scroll */
      .history-table { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .history-toolbar { flex-direction: column; align-items: flex-start; gap: 0.5rem; }

      /* Chart slightly taller columns for finger-friendly reading */
      .chart-wrap { padding: 1rem 0.75rem 0.5rem; }

      /* Modal full width */
      .modal { width: calc(100vw - 1.5rem); padding: 1.25rem; }

      /* State box tighter */
      .state-box { padding: 2rem 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🥗 Calorie Tracker</h1>
    <div class="date" id="header-date"></div>
  </div>
  <div class="header-right">
    <button class="btn" onclick="openSettings()">⚙ Targets</button>
    <button class="btn btn-primary" id="analyze-btn" onclick="analyze()">
      <span class="btn-label-full">Analyze today</span><span class="btn-label-short" style="display:none">Analyze</span>
    </button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="tab-today" onclick="showTab('today')">Today</button>
  <button class="tab" id="tab-history" onclick="showTab('history')">History</button>
</div>

<main id="main">
  <div class="state-box">
    <div class="icon">🥗</div>
    <h2>Ready to analyze</h2>
    <p>Click <strong>Analyze today</strong> to read your Obsidian daily note and estimate your calories and macros.</p>
    <p style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem">
      Make sure your daily note has a <code>## Food</code> section with your meals listed below it.
    </p>
  </div>
</main>

<main id="main-history" style="display:none">
  <div class="state-box">
    <div class="spinner"></div>
    <h2>Loading history…</h2>
    <p></p>
  </div>
</main>

<!-- Settings modal -->
<div class="overlay" id="settings-modal">
  <div class="modal">
    <h2>⚙ Daily Targets</h2>
    <div class="field">
      <label>Calories (kcal)</label>
      <input type="number" id="s-cal" min="0" />
    </div>
    <div class="field">
      <label>Protein (g)</label>
      <input type="number" id="s-pro" min="0" />
    </div>
    <div class="field">
      <label>Carbs (g)</label>
      <input type="number" id="s-carb" min="0" />
    </div>
    <div class="field">
      <label>Fat (g)</label>
      <input type="number" id="s-fat" min="0" />
    </div>
    <div class="field">
      <label>Food section header in daily note</label>
      <input type="text" id="s-header" placeholder="## Food" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let settings = {};
let lastAnalysis = null;
let activeTab = 'today';
let activeMacros = { cal: true, pro: true, carb: false, fat: false };

// ── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
  settings = await api('/api/settings');
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function showTab(tab) {
  activeTab = tab;
  document.getElementById('main').style.display = tab === 'today' ? '' : 'none';
  document.getElementById('main-history').style.display = tab === 'history' ? '' : 'none';
  document.getElementById('tab-today').classList.toggle('active', tab === 'today');
  document.getElementById('tab-history').classList.toggle('active', tab === 'history');
  document.getElementById('analyze-btn').style.display = tab === 'today' ? '' : 'none';
  if (tab === 'history') loadHistory();
}

// ── API ──────────────────────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || 'Request failed');
  }
  return res.json();
}

// ── Analyze ───────────────────────────────────────────────────────────────────
async function analyze() {
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.querySelector('.btn-label-full').textContent = 'Analyzing…';
  btn.querySelector('.btn-label-short').textContent = 'Analyzing…';
  showLoading();

  try {
    const data = await api('/api/analyze');
    lastAnalysis = data;
    renderResults(data.analysis);
    toast('Analysis complete — saved');
  } catch (err) {
    showError(err.message);
  } finally {
    btn.disabled = false;
    btn.querySelector('.btn-label-full').textContent = 'Refresh';
    btn.querySelector('.btn-label-short').textContent = 'Refresh';
  }
}

// ── Render today ──────────────────────────────────────────────────────────────
function renderResults(analysis) {
  const t = analysis.totals;
  const targets = settings;

  const html = `
    <div class="summary-grid">
      ${macroCard('cal', 'Calories', t.calories, targets.calories, 'kcal')}
      ${macroCard('pro', 'Protein', t.protein, targets.protein, 'g')}
      ${macroCard('carb', 'Carbs', t.carbs, targets.carbs, 'g')}
      ${macroCard('fat', 'Fat', t.fat, targets.fat, 'g')}
    </div>
    ${analysis.meals.map(mealCard).join('')}
  `;
  document.getElementById('main').innerHTML = html;
}

function macroCard(cls, label, value, target, unit) {
  const pct = target > 0 ? Math.min((value / target) * 100, 100) : 0;
  const remaining = Math.max(target - value, 0);
  const over = value > target;
  const subText = over
    ? `${value - target}${unit} over target`
    : `${remaining}${unit} remaining`;
  return `<div class="macro-card ${cls}">
    <div class="macro-label">${label}</div>
    <div class="macro-value">${value}<span style="font-size:1rem;font-weight:400"> ${unit}</span></div>
    <div class="macro-sub">${subText}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;
}

function mealCard(meal) {
  const totals = meal.items.reduce((acc, item) => {
    acc.calories += item.calories;
    acc.protein  += item.protein;
    acc.carbs    += item.carbs;
    acc.fat      += item.fat;
    return acc;
  }, { calories: 0, protein: 0, carbs: 0, fat: 0 });

  const rows = meal.items.map(item => `
    <tr>
      <td>${esc(item.food)}</td>
      <td>${item.calories}</td>
      <td>${item.protein}g</td>
      <td>${item.carbs}g</td>
      <td>${item.fat}g</td>
    </tr>
  `).join('');

  return `<div class="meal-card">
    <div class="meal-header">
      <span class="meal-name">${esc(meal.name)}</span>
      <div class="meal-totals">
        <div class="meal-total-item"><strong>${totals.calories}</strong>kcal</div>
        <div class="meal-total-item"><strong>${totals.protein}g</strong>protein</div>
        <div class="meal-total-item"><strong>${totals.carbs}g</strong>carbs</div>
        <div class="meal-total-item"><strong>${totals.fat}g</strong>fat</div>
      </div>
    </div>
    <table>
      <thead><tr>
        <th>Food</th><th>Cal</th><th>Protein</th><th>Carbs</th><th>Fat</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── History ───────────────────────────────────────────────────────────────────
async function loadHistory() {
  const container = document.getElementById('main-history');
  container.innerHTML = `<div class="state-box"><div class="spinner"></div><h2>Loading history…</h2><p></p></div>`;
  try {
    const rows = await api('/api/history');
    if (!rows.length) {
      container.innerHTML = `<div class="state-box"><div class="icon">📭</div><h2>No history yet</h2><p>Analyze a day to start tracking trends.</p></div>`;
      return;
    }
    renderHistory(rows, container);
  } catch (err) {
    container.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><h2>Could not load history</h2><p>${esc(err.message)}</p></div>`;
  }
}

function renderHistory(rows, container) {
  // rows newest-first; chart wants oldest-first
  const chronological = [...rows].reverse();
  container.innerHTML = `
    <div class="history-section">
      <div class="history-toolbar">
        <h2>Last ${rows.length} day${rows.length === 1 ? '' : 's'}</h2>
        <div class="macro-toggle">
          ${pill('cal',  'Cal')}
          ${pill('pro',  'Pro')}
          ${pill('carb', 'Carb')}
          ${pill('fat',  'Fat')}
        </div>
      </div>
      <div class="chart-wrap">
        <div class="chart" id="history-chart"></div>
      </div>
      <div class="history-table">
        <table>
          <thead><tr>
            <th>Date</th><th>Calories</th><th>Protein</th><th>Carbs</th><th>Fat</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `<tr>
              <td>${formatDate(r.date)}</td>
              <td>${r.totals.calories ?? '—'} kcal</td>
              <td>${r.totals.protein ?? '—'} g</td>
              <td>${r.totals.carbs ?? '—'} g</td>
              <td>${r.totals.fat ?? '—'} g</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  drawChart(chronological);
}

function pill(cls, label) {
  const active = activeMacros[cls] ? 'active' : '';
  return `<button class="macro-pill ${cls} ${active}" onclick="toggleMacro('${cls}')">${label}</button>`;
}

function toggleMacro(cls) {
  activeMacros[cls] = !activeMacros[cls];
  // re-render pills and chart without full reload
  document.querySelectorAll('.macro-pill').forEach(el => {
    const c = [...el.classList].find(x => ['cal','pro','carb','fat'].includes(x));
    if (c) el.classList.toggle('active', !!activeMacros[c]);
  });
  document.querySelectorAll('.bar').forEach(el => {
    const c = [...el.classList].find(x => ['cal','pro','carb','fat'].includes(x));
    if (c) el.classList.toggle('hidden', !activeMacros[c]);
  });
}

function drawChart(rows) {
  const targets = { cal: settings.calories, pro: settings.protein, carb: settings.carbs, fat: settings.fat };
  const maxVals = {
    cal:  Math.max(...rows.map(r => r.totals.calories || 0), targets.cal),
    pro:  Math.max(...rows.map(r => r.totals.protein  || 0), targets.pro),
    carb: Math.max(...rows.map(r => r.totals.carbs    || 0), targets.carb),
    fat:  Math.max(...rows.map(r => r.totals.fat      || 0), targets.fat),
  };
  const MAX_H = 140; // px

  const cols = rows.map(r => {
    const vals = {
      cal:  r.totals.calories || 0,
      pro:  r.totals.protein  || 0,
      carb: r.totals.carbs    || 0,
      fat:  r.totals.fat      || 0,
    };
    const bars = ['cal','pro','carb','fat'].map(c => {
      const h = maxVals[c] > 0 ? Math.round((vals[c] / maxVals[c]) * MAX_H) : 0;
      const hidden = activeMacros[c] ? '' : 'hidden';
      return `<div class="bar ${c} ${hidden}" style="height:${h}px" title="${c}: ${vals[c]}"></div>`;
    }).join('');

    const label = r.date.slice(5); // MM-DD
    return `<div class="chart-col">
      <div class="bar-group">${bars}</div>
      <div class="chart-label">${label}</div>
    </div>`;
  }).join('');

  document.getElementById('history-chart').innerHTML = cols;
}

function formatDate(iso) {
  const [y, m, d] = iso.split('-');
  return new Date(+y, +m - 1, +d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── States ────────────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('main').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <h2>Analyzing your food log…</h2>
      <p>Reading your daily note and estimating nutrition.</p>
    </div>`;
}

function showError(msg) {
  document.getElementById('main').innerHTML = `
    <div class="state-box">
      <div class="icon">⚠️</div>
      <h2>Could not analyze</h2>
      <p>${esc(msg)}</p>
      <button class="btn btn-primary" onclick="analyze()">Try again</button>
    </div>`;
}

// ── Settings ──────────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('s-cal').value  = settings.calories   ?? 2000;
  document.getElementById('s-pro').value  = settings.protein    ?? 150;
  document.getElementById('s-carb').value = settings.carbs      ?? 200;
  document.getElementById('s-fat').value  = settings.fat        ?? 65;
  document.getElementById('s-header').value = settings.food_header ?? '## Food';
  document.getElementById('settings-modal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}

async function saveSettings() {
  const updated = {
    calories: parseInt(document.getElementById('s-cal').value),
    protein:  parseInt(document.getElementById('s-pro').value),
    carbs:    parseInt(document.getElementById('s-carb').value),
    fat:      parseInt(document.getElementById('s-fat').value),
    food_header: document.getElementById('s-header').value.trim(),
  };
  try {
    settings = await api('/api/settings', 'PUT', updated);
    closeSettings();
    toast('Targets saved');
    if (lastAnalysis) renderResults(lastAnalysis.analysis);
  } catch (err) {
    toast(err.message, true);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
let toastTimer;
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? '#dc2626' : '#1c1917';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

boot();
</script>
</body>
</html>
